views:
  - title: Brew Dashboard
    icon: mdi:beer
    path: brew
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              # 🍺 {{ state_attr('sensor.homebrewing_fermentation_progress', 'friendly_name') | replace(' Fermentation Progress', '') }}
              ## {{ states('sensor.homebrewing_fermentation_progress') }}% Complete

          - type: custom:brew-glass-card
            glasses:
              - entity: sensor.homebrewing_fermentation_progress
                name: Fermentation
                min: 0
                max: 100
                unit: "%"
                precision: 0
                beer_color: "#C97510"
                foam_color: "#FAE8B4"
              - entity: sensor.homebrewing_estimated_abv
                name: Est. ABV
                min: 0
                max: 10
                unit: "%"
                precision: 2
                beer_color: "#8B3A0F"
                foam_color: "#FFD0C0"
              - entity: sensor.tilt_yellow_temperature
                name: Temperature
                min: 10
                max: 35
                unit: "°C"
                precision: 1
                beer_color: "#EDAF1A"
                foam_color: "#FFF9D0"

          - type: custom:apexcharts-card
            header:
              show: true
              title: Current SG
              show_states: true
            graph_span: 24h
            series:
              - entity: sensor.tilt_yellow_gravity
                name: SG
                stroke_width: 2
                color: "#2a9d8f"
                fill_raw: last
                unit: " SG"
                float_precision: 3
            apex_config:
              chart:
                height: 150
              yaxis:
                min: 1.005
                max: 1.045
                decimals: 3
              xaxis:
                labels:
                  show: false

          - type: thermostat
            entity: climate.homebrewing_heater
            name: Brew Heater

          - type: custom:apexcharts-card
            header:
              show: true
              title: Specific Gravity Over Time
              show_states: true
            graph_span: 7d
            span:
              end: day
            series:
              - entity: sensor.tilt_yellow_gravity
                name: SG
                stroke_width: 2
                color: "#f4a261"
                fill_raw: last
                unit: " SG"
                float_precision: 3
            apex_config:
              chart:
                height: 250
              xaxis:
                labels:
                  format: "dd MMM"
              yaxis:
                min: 1.005
                max: 1.045
                decimals: 3
              annotations:
                yaxis:
                  - y: 1.010
                    borderColor: "#e76f51"
                    borderWidth: 2
                    strokeDashArray: 4
                    label:
                      text: Target FG
                      style:
                        color: "#e76f51"
