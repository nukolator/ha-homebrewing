views:
  - title: Brew Dashboard
    icon: mdi:beer
    path: brew
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              # 🍺 {{ state_attr('sensor.homebrewing_fermentation_progress', 'friendly_name') | replace(' Fermentation Progress', '') }}
              ## {{ states('sensor.homebrewing_fermentation_progress') }}% Complete
          - type: custom:bar-card
            name: Fermentation Progress
            entity: sensor.homebrewing_fermentation_progress
            min: 0
            max: 100
            height: 40px
            positions:
              icon: "off"
              indicator: "off"
              name: outside
              value: outside
            severity:
              - color: "#f4a261"
                from: 0
                to: 100
            style: |
              bar-card-background {
                border-radius: 6px;
              }
              bar-card-currentbar {
                border-radius: 6px;
              }
          - type: custom:bar-card
            name: Estimated ABV
            entity: sensor.homebrewing_estimated_abv
            min: 0
            max: 10
            height: 40px
            positions:
              icon: "off"
              indicator: "off"
              name: outside
              value: outside
            severity:
              - color: "#e76f51"
                from: 0
                to: 10
            style: |
              bar-card-background {
                border-radius: 6px;
              }
              bar-card-currentbar {
                border-radius: 6px;
              }
          - type: custom:bar-card
            name: Brew Temperature
            entity: sensor.tilt_yellow_temperature
            min: 10
            max: 35
            height: 40px
            positions:
              icon: "off"
              indicator: "off"
              name: outside
              value: outside
            severity:
              - color: "#2a9d8f"
                from: 10
                to: 24
              - color: "#e9c46a"
                from: 24
                to: 28
              - color: "#e63946"
                from: 28
                to: 35
            style: |
              bar-card-background {
                border-radius: 6px;
              }
              bar-card-currentbar {
                border-radius: 6px;
              }
          - type: custom:apexcharts-card
            header:
              show: true
              title: Current SG (24h)
              show_states: true
            graph_span: 24h
            series:
              - entity: sensor.tilt_yellow_gravity
                name: SG
                stroke_width: 2
                color: "#2a9d8f"
                fill_raw: last
                unit: " SG"
                float_precision: 3
            apex_config:
              chart:
                height: 150
              yaxis:
                min: 1.005
                max: 1.045
                decimals: 3
              xaxis:
                labels:
                  show: false
          - type: thermostat
            entity: climate.homebrewing_heater
            name: Brew Heater
          - type: custom:apexcharts-card
            header:
              show: true
              title: Specific Gravity Over Time
              show_states: true
            graph_span: 7d
            span:
              end: day
            series:
              - entity: sensor.tilt_yellow_gravity
                name: SG
                stroke_width: 2
                color: "#f4a261"
                fill_raw: last
                unit: " SG"
                float_precision: 3
            apex_config:
              chart:
                height: 250
              xaxis:
                labels:
                  format: "dd MMM"
              yaxis:
                min: 1.005
                max: 1.045
                decimals: 3
              annotations:
                yaxis:
                  - y: 1.010
                    borderColor: "#e76f51"
                    borderWidth: 2
                    strokeDashArray: 4
                    label:
                      text: Target FG
                      style:
                        color: "#e76f51"
