title: Brew Dashboard
icon: mdi:beer
path: brew
type: panel
cards:
  - type: vertical-stack
    cards:

      # ─── Title ───────────────────────────────────────────────
      - type: markdown
        content: >
          # 🍺 {{ states('sensor.your_brew_name_fermentation_progress') }}% Complete
          **{{ state_attr('climate.your_brew_name_heater', 'friendly_name') }}**

      # ─── Top Row: Progress + ABV + Gauges ────────────────────
      - type: horizontal-stack
        cards:

          # Fermentation Progress Radial Bar
          - type: custom:apexcharts-card
            header:
              show: true
              title: Fermentation Progress
              show_states: false
            chart_type: radialBar
            series:
              - entity: sensor.your_brew_name_fermentation_progress
                name: Progress
            apexcharts_options:
              colors:
                - "#f4a261"
              plotOptions:
                radialBar:
                  hollow:
                    size: 60%
                  dataLabels:
                    name:
                      show: false
                    value:
                      fontSize: 28px
                      fontWeight: bold
                      formatter: "function(val) { return val + '%' }"

          # Estimated ABV
          - type: custom:apexcharts-card
            header:
              show: true
              title: Estimated ABV
              show_states: false
            chart_type: radialBar
            series:
              - entity: sensor.your_brew_name_estimated_abv
                name: ABV
                max: 10
            apexcharts_options:
              colors:
                - "#e76f51"
              plotOptions:
                radialBar:
                  hollow:
                    size: 60%
                  dataLabels:
                    name:
                      show: false
                    value:
                      fontSize: 28px
                      fontWeight: bold
                      formatter: "function(val) { return val + '%' }"

      # ─── Middle Row: SG + Temperature Gauges ─────────────────
      - type: horizontal-stack
        cards:

          # Current Specific Gravity
          - type: custom:apexcharts-card
            header:
              show: true
              title: Current SG
              show_states: true
            chart_type: radialBar
            series:
              - entity: sensor.tilt_yellow_gravity
                name: SG
                min: 1.000
                max: 1.080
            apexcharts_options:
              colors:
                - "#2a9d8f"
              plotOptions:
                radialBar:
                  hollow:
                    size: 60%
                  dataLabels:
                    name:
                      show: false
                    value:
                      fontSize: 22px
                      fontWeight: bold
                      formatter: "function(val) { return (1 + val / 100 * 0.08).toFixed(3) }"

          # Current Temperature
          - type: custom:apexcharts-card
            header:
              show: true
              title: Brew Temperature
              show_states: true
            chart_type: radialBar
            series:
              - entity: sensor.tilt_yellow_temperature
                name: Temp
                min: 10
                max: 35
            apexcharts_options:
              colors:
                - "#264653"
              plotOptions:
                radialBar:
                  hollow:
                    size: 60%
                  dataLabels:
                    name:
                      show: false
                    value:
                      fontSize: 22px
                      fontWeight: bold
                      formatter: "function(val) { return (10 + val / 100 * 25).toFixed(1) + '°C' }"

      # ─── Heater Control ───────────────────────────────────────
      - type: thermostat
        entity: climate.your_brew_name_heater
        name: Brew Heater

      # ─── SG History Graph ─────────────────────────────────────
      - type: custom:apexcharts-card
        header:
          show: true
          title: Specific Gravity Over Time
          show_states: true
        hours_to_show: 168
        graph_span: 7d
        span:
          end: now
        series:
          - entity: sensor.tilt_yellow_gravity
            name: SG
            stroke_width: 2
            color: "#f4a261"
            fill_raw: last
            statistics:
              type: mean
              period: hour
        yaxis:
          - min: ~1.000
            max: ~1.060
            decimals: 3
        apexcharts_options:
          chart:
            height: 250
          xaxis:
            labels:
              format: "dd MMM"
          annotations:
            yaxis:
              - y: 1.010
                borderColor: "#e76f51"
                borderWidth: 2
                strokeDashArray: 4
                label:
                  text: Target FG
                  style:
                    color: "#e76f51"
